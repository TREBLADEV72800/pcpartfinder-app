services:
  postgres:
    image: postgres:16-alpine
    container_name: pcbuilder-db
    environment:
      POSTGRES_USER: pcbuilder
      POSTGRES_PASSWORD: pcbuilder_dev
      POSTGRES_DB: pcbuilder
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pcbuilder"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: pcbuilder-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata:
